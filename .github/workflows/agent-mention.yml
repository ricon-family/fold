# Pilot workflow: wake fold agents from GitHub comment mentions.
# This file is intentionally handwritten while we prove the UX; do not add it
# to shimmer generation until the mention semantics settle.

name: Agent Mention Pilot

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  detect:
    name: Detect agent mentions
    runs-on: ubuntu-latest
    outputs:
      should_wake: ${{ steps.detect.outputs.should_wake }}
      reason: ${{ steps.detect.outputs.reason }}
      matched_agents: ${{ steps.detect.outputs.matched_agents }}
      agent_brownie: ${{ steps.detect.outputs.agent_brownie }}
      agent_c0da: ${{ steps.detect.outputs.agent_c0da }}
      agent_iris: ${{ steps.detect.outputs.agent_iris }}
      agent_johnson: ${{ steps.detect.outputs.agent_johnson }}
      agent_junior: ${{ steps.detect.outputs.agent_junior }}
      agent_k7r2: ${{ steps.detect.outputs.agent_k7r2 }}
      agent_quick: ${{ steps.detect.outputs.agent_quick }}
      agent_rho: ${{ steps.detect.outputs.agent_rho }}
      agent_x1f9: ${{ steps.detect.outputs.agent_x1f9 }}
      message: ${{ steps.detect.outputs.message }}
    steps:
      - name: Checkout fold
        uses: actions/checkout@v6

      - name: Detect mentions
        id: detect
        env:
          # Individual-handle pilot scope only. Team fanout stays disabled until
          # we design fanout limits/jitter explicitly.
          AGENT_ROSTER: brownie,c0da,iris,johnson,junior,k7r2,quick,rho,x1f9
          ALLOWED_ASSOCIATIONS: OWNER,MEMBER,COLLABORATOR
        run: python3 .github/scripts/agent-mention-detect.py

      - name: Mention detection summary
        run: |
          {
            echo "### Agent mention pilot"
            echo ""
            echo "- should_wake: ${{ steps.detect.outputs.should_wake }}"
            echo "- reason: ${{ steps.detect.outputs.reason }}"
            echo "- matched_agents: ${{ steps.detect.outputs.matched_agents }}"
          } >> "$GITHUB_STEP_SUMMARY"

  wake-brownie:
    name: Wake brownie
    needs: detect
    if: ${{ needs.detect.outputs.agent_brownie == 'true' }}
    concurrency:
      # At most one running and one pending mention wake per thread/agent.
      # A newer pending wake replaces an older pending one; running sessions
      # are not canceled.
      group: fold-agent-mention-brownie-${{ github.event.issue.number }}
      cancel-in-progress: false
    uses: ./.github/workflows/agent-run.yml
    with:
      agent: brownie
      message: ${{ needs.detect.outputs.message }}
      model: openai-codex/gpt-5.5
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
      AGENT_GITHUB_PAT: ${{ secrets.BROWNIE_GITHUB_PAT }}
      AGENT_GPG_PRIVATE_KEY: ${{ secrets.BROWNIE_GPG_PRIVATE_KEY }}
      AGENT_EMAIL_PASSWORD: ${{ secrets.BROWNIE_EMAIL_PASSWORD }}
      AGENT_GITHUB_PASSWORD: ${{ secrets.BROWNIE_GITHUB_PASSWORD }}

  wake-c0da:
