# Regenerate: shimmer workflows generate
#
# Agent Run - Reusable workflow for running agents

name: Agent Run

on:
  workflow_call:
    inputs:
      agent:
        description: 'Agent to run (e.g., c0da, quick)'
        required: true
        type: string
      message:
        description: 'Message/instruction for the agent'
        required: true
        type: string
      model:
        description: 'Provider-qualified model to use (e.g., openai-codex/gpt-5.5)'
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      PI_AUTH_JSON:
        required: false
      AGENT_GITHUB_PAT:
        required: true
      AGENT_GPG_PRIVATE_KEY:
        required: true
      AGENT_EMAIL_PASSWORD:
        required: true
      AGENT_MATRIX_PASSWORD:
        required: false
      AGENT_GITHUB_PASSWORD:
        required: false
      AGENT_B2_ENDPOINT:
        required: false
      AGENT_B2_KEY_ID:
        required: false
      AGENT_B2_APPLICATION_KEY:
        required: false
      AGENT_B2_BUCKET:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      WORK_DIR: /home/runner/agents/${{ inputs.agent }}/${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}
      # Nested shiv package installs run their own mise commands.
      MISE_EXPERIMENTAL: "1"
    defaults:
      run:
        working-directory: /home/runner/agents/${{ inputs.agent }}/${{ github.event.repository.name }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_PAT }}
          path: repo

      - name: Setup workspace
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$(dirname "$WORK_DIR")"
          mv repo "$WORK_DIR"

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
        env:
          GITHUB_TOKEN: ${{ secrets.AGENT_GITHUB_PAT }}

      - name: Install project tools
        env:
          MISE_JOBS: 1  # Serialize — vfox-shiv bootstrap isn't parallel-safe yet
        run: |
          mise trust
          mise install

      - name: Compute sessions CLI cache key
        id: sessions
        run: |
          SESSIONS_DIR="$(mise where shiv:sessions)/packages/sessions"
          echo "mix-lock-hash=$(sha256sum "$SESSIONS_DIR/cli/mix.lock" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache sessions CLI build
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs/shiv-sessions/*/packages/sessions/cli/_build
            ~/.local/share/mise/installs/shiv-sessions/*/packages/sessions/cli/deps
          key: ${{ runner.os }}-sessions-cli-${{ steps.sessions.outputs.mix-lock-hash }}
          restore-keys: |
            ${{ runner.os }}-sessions-cli-

      - name: Build sessions CLI
        run: sessions cli:build

      - name: Install pi
        run: mise use -g github:badlogic/pi-mono@0.70.5

      - name: Setup secrets for env provider
        env:
          AGENT_GITHUB_PAT: ${{ secrets.AGENT_GITHUB_PAT }}
          AGENT_GPG_PRIVATE_KEY: ${{ secrets.AGENT_GPG_PRIVATE_KEY }}
          AGENT_EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
          AGENT_MATRIX_PASSWORD: ${{ secrets.AGENT_MATRIX_PASSWORD }}
          AGENT_GITHUB_PASSWORD: ${{ secrets.AGENT_GITHUB_PASSWORD }}
          AGENT_B2_ENDPOINT: ${{ secrets.AGENT_B2_ENDPOINT }}
          AGENT_B2_KEY_ID: ${{ secrets.AGENT_B2_KEY_ID }}
          AGENT_B2_APPLICATION_KEY: ${{ secrets.AGENT_B2_APPLICATION_KEY }}
          AGENT_B2_BUCKET: ${{ secrets.AGENT_B2_BUCKET }}
        run: |
          # Re-export secrets with agent-prefixed names so the env provider
          # can find them. secrets get "c0da/github-pat" → looks up C0DA_GITHUB_PAT.
          AGENT_UPPER=$(echo "${{ inputs.agent }}" | tr '[:lower:]-' '[:upper:]_')

          declare -A SECRETS_MAP=(
            [GITHUB_PAT]="$AGENT_GITHUB_PAT"
            [GPG_PRIVATE_KEY]="$AGENT_GPG_PRIVATE_KEY"
            [EMAIL_PASSWORD]="$AGENT_EMAIL_PASSWORD"
            [MATRIX_PASSWORD]="${AGENT_MATRIX_PASSWORD:-}"
            [GITHUB_PASSWORD]="${AGENT_GITHUB_PASSWORD:-}"
            [B2_ENDPOINT]="${AGENT_B2_ENDPOINT:-}"
            [B2_KEY_ID]="${AGENT_B2_KEY_ID:-}"
            [B2_APPLICATION_KEY]="${AGENT_B2_APPLICATION_KEY:-}"
            [B2_BUCKET]="${AGENT_B2_BUCKET:-}"
          )

          for key in "${!SECRETS_MAP[@]}"; do
            value="${SECRETS_MAP[$key]}"
            [ -z "$value" ] && continue
            DELIM="EOFVAL_$(openssl rand -hex 8)"
            {
              echo "${AGENT_UPPER}_${key}<<${DELIM}"
              echo "$value"
              echo "${DELIM}"
            } >> "$GITHUB_ENV"
          done

          echo "SECRETS_PROVIDER=env" >> "$GITHUB_ENV"

      - name: Setup GPG
        run: shimmer gpg:setup ${{ inputs.agent }}

      - name: Setup email
        env:
          EMAIL_PASSWORD: ${{ secrets.AGENT_EMAIL_PASSWORD }}
        run: emails setup ${{ inputs.agent }}

      - name: Setup Matrix
        continue-on-error: true
        run: shimmer matrix:login ${{ inputs.agent }}

      - name: Setup blob storage
        continue-on-error: true
        run: |
          if secrets get "${{ inputs.agent }}/b2-endpoint" >/dev/null 2>&1; then
            shimmer blob:setup ${{ inputs.agent }}
          else
            echo "B2 credentials not configured, skipping blob storage setup"
          fi

      - name: Clone home repo
        run: |
          HOME_DIR="$HOME/agents/${{ inputs.agent }}/home"
          HOME_REPO="${{ inputs.agent }}-ricon/home"
          LEGACY_REPO="${{ inputs.agent }}-ricon/zettelkasten"

          if gh repo view "$HOME_REPO" --json name > /dev/null 2>&1; then
            REPO="$HOME_REPO"
          elif gh repo view "$LEGACY_REPO" --json name > /dev/null 2>&1; then
            REPO="$LEGACY_REPO"
          else
            echo "No home repo found for ${{ inputs.agent }}, skipping"
            exit 0
          fi

          if [ -d "$HOME_DIR/.git" ]; then
            echo "Home repo already available at $HOME_DIR"
            exit 0
          fi

          echo "Cloning home repo from $REPO..."
          mkdir -p "$(dirname "$HOME_DIR")"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$HOME_DIR"
          echo "Home repo available at $HOME_DIR"

      - name: Prepare home repo
        env:
          MISE_JOBS: 1
        run: |
          set -euo pipefail

          HOME_DIR="$HOME/agents/${{ inputs.agent }}/home"
          if [ ! -d "$HOME_DIR/.git" ]; then
            echo "Home repo not present at $HOME_DIR; skipping home preparation"
            exit 0
          fi

          cd "$HOME_DIR"
          gh auth setup-git
          mise trust
          mise install

          if [ -d ".git-crypt" ] || [ -d "notes" ]; then
            rudi install
            notes unlock
            notes install-hooks
          fi

          if [ -f ".modules/config" ]; then
            modules install-hooks
            modules init
          fi

      - name: Unlock caller repo notes
        run: |
          if [ -d ".git-crypt" ]; then
            rudi install
            notes unlock || echo "Warning: notes unlock failed — encrypted files may not be readable"
          fi

      - name: Setup pi auth
        env:
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
        run: |
          if [ -z "${PI_AUTH_JSON:-}" ]; then
            echo "PI_AUTH_JSON not configured; pi will use provider env vars or existing auth."
            exit 0
          fi

          # First-pass CI restoration: write auth.json for this run only.
          # This intentionally does not sync refreshed OAuth tokens back to
          # GitHub secrets yet; token freshness/concurrency is follow-up work.
          PI_AGENT_DIR="$RUNNER_TEMP/pi-agent"
          mkdir -p "$PI_AGENT_DIR"
          chmod 700 "$PI_AGENT_DIR"
          printf '%s' "$PI_AUTH_JSON" > "$PI_AGENT_DIR/auth.json"
          chmod 600 "$PI_AGENT_DIR/auth.json"
          echo "PI_CODING_AGENT_DIR=$PI_AGENT_DIR" >> "$GITHUB_ENV"

      - name: Run agent
        env:
          AGENT: ${{ inputs.agent }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BROWSER_GITHUB_COM_PASSWORD: ${{ secrets.AGENT_GITHUB_PASSWORD }}
          BROWSER_GITHUB_COM_USERNAME: ${{ inputs.agent }}-ricon
          DISPATCH_CONTEXT: ${{ github.triggering_actor }}
          INPUT_MESSAGE: ${{ inputs.message }}
          INPUT_MODEL: ${{ inputs.model }}
          RUN_TIMEOUT: 900
        run: |
          echo "### AGENT SESSION START ###"

          echo "Working directory: $(pwd)"

          # shimmer as sets identity env vars (AGENT_IDENTITY, GIT_AUTHOR_*, GH_TOKEN, etc.)
          # shimmer agent --headless delegates to sessions run for execution
          eval "$(shimmer as "$AGENT")"

          # Configure gh as git credential helper so shiv can clone private repos
          gh auth setup-git

          if [ -z "$INPUT_MODEL" ]; then
            echo "::error::model input is required"
            exit 1
          fi

          if [[ "$INPUT_MODEL" != */* ]]; then
            echo "::error::model input must be provider-qualified (for example: openai-codex/gpt-5.5)"
            exit 1
          fi

          CMD=(shimmer agent --headless --timeout "$RUN_TIMEOUT" --model "$INPUT_MODEL")
          CMD+=("$INPUT_MESSAGE")

          "${CMD[@]}"

          echo "### AGENT SESSION END ###"

      - name: Post-failure diagnostics
        if: failure()
        run: |
          echo "=== Diagnostics ==="
          echo ""
          echo "--- GitHub API rate limit ---"
          gh api rate_limit --jq '.resources.core | "Used: \(.used)/\(.limit) | Remaining: \(.remaining) | Resets: \(.reset | todate)"' 2>/dev/null || echo "(unavailable)"
          echo ""
          echo "--- Disk usage ---"
          df -h / | tail -1
          du -sh "$WORK_DIR" 2>/dev/null || true
          du -sh "$HOME/agents" 2>/dev/null || true
          echo ""
          echo "--- mise status ---"
          mise doctor 2>/dev/null | head -30 || echo "(mise doctor unavailable)"
          echo ""
          echo "--- Installed tools ---"
          mise ls 2>/dev/null || echo "(mise ls unavailable)"
          echo ""
          echo "--- Network connectivity ---"
          curl -so /dev/null -w "github.com: HTTP %{http_code} (%{time_total}s)\n" https://github.com 2>/dev/null || echo "github.com: unreachable"
          curl -so /dev/null -w "api.github.com: HTTP %{http_code} (%{time_total}s)\n" https://api.github.com 2>/dev/null || echo "api.github.com: unreachable"
