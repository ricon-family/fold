name: junior-daily-checkin

on:
  schedule:
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
    - cron: ''
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/agent-run.yml
    with:
      agent: junior
      message: Check your zettelkasten for job instructions at jobs/dc-checkin.txt and execute them.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AGENT_GITHUB_PAT: ${{ secrets.JUNIOR_GITHUB_PAT }}
      AGENT_GPG_PRIVATE_KEY: ${{ secrets.JUNIOR_GPG_PRIVATE_KEY }}
      AGENT_EMAIL_PASSWORD: ${{ secrets.JUNIOR_EMAIL_PASSWORD }}
      AGENT_MATRIX_PASSWORD: ${{ secrets.JUNIOR_MATRIX_PASSWORD }}
      AGENT_PASSPHRASE: ${{ secrets.JUNIOR_PASSPHRASE }}
      AGENT_GITHUB_PASSWORD: ${{ secrets.JUNIOR_GITHUB_PASSWORD }}
