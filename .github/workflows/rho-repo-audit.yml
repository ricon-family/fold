name: rho-repo-audit

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/agent-run.yml
    with:
      agent: rho
      message: Read .jobs/repo-audit.txt in fold and execute those instructions.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AGENT_GITHUB_PAT: ${{ secrets.RHO_GITHUB_PAT }}
      AGENT_GPG_PRIVATE_KEY: ${{ secrets.RHO_GPG_PRIVATE_KEY }}
      AGENT_EMAIL_PASSWORD: ${{ secrets.RHO_EMAIL_PASSWORD }}
      AGENT_MATRIX_PASSWORD: ${{ secrets.RHO_MATRIX_PASSWORD }}
      AGENT_PASSPHRASE: ${{ secrets.RHO_PASSPHRASE }}
      AGENT_GITHUB_PASSWORD: ${{ secrets.RHO_GITHUB_PASSWORD }}
