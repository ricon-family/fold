# Temporary diagnostic workflow — delete after debugging
name: debug-gpg

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check GPG key format
        env:
          GPG_KEY: ${{ secrets.QUICK_GPG_PRIVATE_KEY }}
        run: |
          echo "=== Key diagnostics ==="
          echo "Key length: ${#GPG_KEY}"
          echo "Line count: $(echo "$GPG_KEY" | wc -l)"
          echo "First char hex: $(echo "$GPG_KEY" | head -c 1 | xxd -p)"
          echo "Starts with dash: $(echo "$GPG_KEY" | head -c 1 | grep -c '^-' || true)"
          echo "Starts with quote: $(echo "$GPG_KEY" | head -c 1 | grep -c '^"' || true)"
          echo "Has literal quotes: $(echo "$GPG_KEY" | grep -c '"' || true)"
          echo "Has literal backslash-n: $(echo "$GPG_KEY" | grep -c '\\n' || true)"
          echo ""
          echo "=== First line hex dump (first 40 bytes) ==="
          echo "$GPG_KEY" | head -1 | head -c 40 | xxd
          echo ""
          echo "=== Last line hex dump ==="
          echo "$GPG_KEY" | tail -1 | xxd
