[settings]
experimental = true
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
usage = "3.2.1"                   # CLI arg parsing for tasks
yq = "4.50.1"                     # YAML processing
gh = "2.92.0"                    # GitHub API for token status tasks
"shiv:shimmer" = "0.1"
"shiv:browser" = "0.1"
"shiv:websites" = "0.1"
"shiv:sessions" = "0.4"
"shiv:modules" = "0.9"
"shiv:notes" = "0.8"
"shiv:threads" = "0.3"
"shiv:rudi" = "0.5"                       # git-crypt wrapper — CI calls rudi install directly
"shiv:secrets" = "0.1"
"shiv:emails" = "0.5"
"shiv:codebase" = "0.3"
"shiv:farts" = "0.1"                      # Frontmatter queries for agent:list

[_.codebase]
lint = ["mise-settings", "gum-table"]

[_.codebase.scope]
gum-table = ".mise/tasks"
