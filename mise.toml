[settings]
experimental = true
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
usage = "3.2.1"                   # CLI arg parsing for tasks
yq = "4.50.1"                     # YAML processing
"shiv:shimmer" = "0.1.3"
"shiv:sessions" = "0.4.2"
"shiv:modules" = "0.9.5"
"shiv:notes" = "0.8.5"
"shiv:threads" = "0.3.0"
"shiv:rudi" = "0.5.1"                     # git-crypt wrapper — CI calls rudi install directly
"shiv:secrets" = "0.1.0"
"shiv:emails" = "0.5.1"
"shiv:codebase" = "0.3.0"
"shiv:farts" = "latest"                   # Frontmatter queries for agent:list

[_.codebase]
lint = ["mise-settings", "gum-table"]

[_.codebase.scope]
gum-table = ".mise/tasks"
