[settings]
experimental = true
quiet = true
task_output = "interleave"

[shell_alias]
header = '''printf '\n== %s ==\n''''

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
"aqua:shenwei356/rush" = "0.9.0" # Cross-file BATS parallel runner
usage = "3.2.1"                   # CLI arg parsing for tasks
yq = "4.50.1"                     # YAML processing
jq = "1.8.1"                     # JSON processing for task composition
gh = "2.92.0"                    # GitHub API for token status tasks
bats = "1.13.0"                  # Task test suite
gum = "0.17.0"                   # Human-readable task tables and welcome output
"shiv:shimmer" = "0.1"
"shiv:browser" = "0.1"
"shiv:websites" = "0.1"
"shiv:sessions" = "0.4"
"shiv:modules" = "0.9"
"shiv:notes" = "0.8"
"shiv:threads" = "0.3"
"shiv:rudi" = "0.5"                       # git-crypt wrapper — CI calls rudi install directly
"shiv:secrets" = "0.2"
"shiv:emails" = "0.7"
"shiv:codebase" = "0.3"
"shiv:comments" = "0.3"
"shiv:chat" = "0.2"

[_.codebase]
lint = ["mise-settings", "gum-table"]

[_.codebase.scope]
gum-table = ".mise/tasks"
