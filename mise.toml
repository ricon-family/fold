[settings]
experimental = true
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
"ubi:pimalaya/himalaya" = "1.1.0" # Email CLI for agents
usage = "1"                       # CLI arg parsing for tasks
yq = "4.50.1"                     # YAML processing
"shiv:shimmer" = "latest"
"shiv:sessions" = "0.3.0"
"shiv:modules" = "latest"
"shiv:notes" = "0.8.1"
"shiv:threads" = "latest"
"shiv:rudi" = "0.5.1"                     # git-crypt wrapper — CI calls rudi install directly
"shiv:secrets" = "0.1.0"
"shiv:emails" = "0.4.1"
"shiv:codebase" = "0.1.0"
"shiv:farts" = "0.1.0"                    # Frontmatter queries for agent:list

[_.codebase]
lint = ["mise-settings", "gum-table"]

[_.codebase.scope]
gum-table = ".mise/tasks"
