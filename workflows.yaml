# yaml-language-server: $schema=https://raw.githubusercontent.com/KnickKnackLabs/shimmer/main/workflows.schema.json
#
# Agent workflow schedules for fold.
# Run `shimmer workflows:generate` to regenerate workflow files.
#
# Agent identities are in fold/agents/.
# Job definitions live in each work repo's .jobs/ directory.

workflows:
  - name: ghl-referral
    agent: c0da
    model: claude-sonnet-4-6
    schedule:
      - "0 14,16,18,20,22 * * 1-5"  # weekdays every 2h, 9am-5pm EST
      - "0 14,18,22 * * 0,6"        # weekends every 4h, 9am-5pm EST
    message: "Use `gh repo clone` to clone ricon-family/grow-heal-love to your workspace and read .jobs/referral-check.txt for instructions."

  - name: junior-daily-checkin
    agent: junior
    schedule:
      - "0 15 * * *"  # 10am EST daily
    message: "Check your zettelkasten for job instructions at jobs/dc-checkin.txt and execute them."

  - name: rho-repo-audit
    agent: rho
    schedule:
      - "0 16 * * 1"  # Monday 11am EST weekly
    message: "Read .jobs/repo-audit.txt in fold and execute those instructions."

